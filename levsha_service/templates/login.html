<!-- templates/login.html -->
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Вход | Левша</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

<div class="auth-modal auth-modal-open">
    <div class="auth-modal-content">

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% endwith %}

        <!-- Форма входа -->
        <div id="login-form-block">
            <h2>Вход</h2>
            <form method="post" action="{{ url_for('login') }}">
                <label>Логин</label>
                <input type="text" name="login" required>

                <label>Пароль</label>
                <input type="password" name="password" required>

                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <div class="auth-toggle">
                Нет аккаунта?
                <a href="#" id="show-register">Регистрация</a>
            </div>
        </div>

        <!-- Форма регистрации -->
        <div id="register-form-block" class="hidden">
            <div class="auth-back-row">
                <button id="back-to-login" class="btn-back">&larr;</button>
                <span>Регистрация</span>
            </div>
            <form method="post" action="{{ url_for('register') }}">
                <label>ФИО</label>
                <input type="text" name="full_name" required>

                <label>Телефон</label>
                <input type="text" name="phone">

                <label>Email</label>
                <input type="email" name="email">

                <label>Логин</label>
                <input type="text" name="login" required>

                <label>Пароль</label>
                <input type="password" name="password" required>

                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            </form>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
